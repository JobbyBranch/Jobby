name: JobRadar source discovery

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests PyYAML

      - name: Discover career pages
        run: python discover.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "jobradar-bot"
          git config user.email "bot@jobradar"
          git add discovered_sources.yaml discovery_report.txt
          git diff --cached --quiet || git commit -m "source discovery"
          git push
