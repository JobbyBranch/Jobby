name: JobRadar daily scan

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CANDIDATES_CSV_URL: ${{ secrets.CANDIDATES_CSV_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SCHEDULE_GUARD: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python scraper.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "jobradar-bot"
          git config user.email "bot@jobradar"
          git add state/ output/
          git diff --cached --quiet || git commit -m "daily scan"
          git pull --rebase origin main
          git push
