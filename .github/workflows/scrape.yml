name: JobRadar daily scan

on:
  schedule:
    # 08:00 Brussels = 06:00 UTC in summer, 07:00 UTC in winter.
    # Both fire; the guard below keeps only the true 08:00 local run.
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}   # manual test runs always execute fully

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CANDIDATES_CSV_URL: ${{ secrets.CANDIDATES_CSV_URL }}
          # Guard only for scheduled runs; manual runs skip the time check
          SCHEDULE_GUARD: ${{ github.event_name == 'schedule' && '1' || '0' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CANDIDATES_CSV_URL: ${{ secrets.CANDIDATES_CSV_URL }}# optional
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}   # optional
        run: python scraper.py

      - name: Commit state and results
        run: |
          git config user.name "jobradar-bot"
          git config user.email "bot@jobradar"
          mkdir -p state output
          git add state output
          git diff --cached --quiet || git commit -m "scan: $(date -u +%F)"
          git push
