/* ─────────── LIGHTWEIGHT CHARTS (no external libs) ─────────── */
function MiniAreaChart({ data }) {
  const W = 640, H = 200, P = 28;
  const maxMon = Math.max(...data.map((d) => d.monitored)) * 1.15;
  const maxMkt = Math.max(...data.map((d) => d.market)) * 1.15;
  const x = (i) => P + (i * (W - 2 * P)) / (data.length - 1);
  const yMon = (v) => H - P - (v / maxMon) * (H - 2 * P);
  const yMkt = (v) => H - P - (v / maxMkt) * (H - 2 * P);
  const monPts = data.map((d, i) => `${x(i)},${yMon(d.monitored)}`).join(" ");
  const mktPts = data.map((d, i) => `${x(i)},${yMkt(d.market)}`).join(" ");
  const monArea = `${P},${H - P} ${monPts} ${W - P},${H - P}`;
  return (
    <svg viewBox={`0 0 ${W} ${H + 18}`} className="w-full" style={{ height: 230 }}>
      <defs>
        <linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#EC4899" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#EC4899" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75, 1].map((f) => (
        <line key={f} x1={P} x2={W - P} y1={H - P - f * (H - 2 * P)} y2={H - P - f * (H - 2 * P)} stroke="#E9EAF1" strokeDasharray="3 3" />
      ))}
      <polygon points={monArea} fill="url(#agrad)" />
      <polyline points={mktPts} fill="none" stroke="#4F6BFF" strokeWidth="2" strokeDasharray="5 4" />
      <polyline points={monPts} fill="none" stroke="#EC4899" strokeWidth="2.5" strokeLinejoin="round" />
      {data.map((d, i) => <circle key={i} cx={x(i)} cy={yMon(d.monitored)} r="3" fill="#EC4899" />)}
      {data.map((d, i) => (
        <text key={i} x={x(i)} y={H + 8} textAnchor="middle" fontSize="9.5" fontWeight="600" fill="#9DA1B4">{d.week}</text>
      ))}
    </svg>
  );
}

function MiniBarChart({ data }) {
  const W = 640, H = 210, P = 26;
  const maxAbs = Math.max(...data.map((d) => Math.abs(d.change))) * 1.15;
  const zero = P + ((H - 2 * P) * maxAbs) / (2 * maxAbs) + (H - 2 * P) / 2 * 0; // midline
  const y0 = H / 2;
  const scale = (H / 2 - P) / maxAbs;
  const bw = (W - 2 * P) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H + 14}`} className="w-full" style={{ height: 230 }}>
      <line x1={P - 8} x2={W - P + 8} y1={y0} y2={y0} stroke="#E9EAF1" />
      {data.map((d, i) => {
        const h = Math.abs(d.change) * scale;
        const bx = P + i * bw + bw * 0.18;
        const by = d.change >= 0 ? y0 - h : y0;
        return (
          <g key={d.skill}>
            <rect x={bx} y={by} width={bw * 0.64} height={h} rx="5" fill={d.change >= 0 ? "#4F6BFF" : "#F0A5C0"} />
            <text x={bx + bw * 0.32} y={d.change >= 0 ? by - 5 : by + h + 11} textAnchor="middle" fontSize="9.5" fontWeight="700"
              fill={d.change >= 0 ? "#4F6BFF" : "#DB5E8F"}>{d.change > 0 ? "+" : ""}{d.change}%</text>
            <text x={bx + bw * 0.32} y={H + 8} textAnchor="middle" fontSize="9" fontWeight="600" fill="#9DA1B4">{d.skill}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ─────────── LIVE DATA (scraper) HELPERS ─────────── */
const AVATAR_COLORS = ["#EC4899", "#4F6BFF", "#8B5CF6", "#06B6D4", "#F59E0B", "#10B981", "#6366F1", "#F43F5E"];

function companyVisual(name) {
  let h = 0;
  for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  const words = name.trim().split(/\s+/);
  const logo = (words.length > 1 ? words[0][0] + words[1][0] : name.slice(0, 2)).toUpperCase();
  return { logo, color: AVATAR_COLORS[h % AVATAR_COLORS.length] };
}

function mapScraperJobs(data) {
  const now = Date.now();
  return data
    .filter((j) => j && j.title && j.url)
    .map((j, i) => {
      const v = companyVisual(j.company || "?");
      const fs = j.first_seen ? new Date(j.first_seen) : null;
      const isNew = fs ? (now - fs.getTime()) / 86400000 < 2 : false;
      const date = fs ? fs.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }) : "—";
      return {
        id: `live-${i}`,
        company: j.company || "Unknown",
        logo: v.logo,
        logoColor: v.color,
        title: j.title,
        date,
        stack: (j.stack || []).slice(0, 6),
        exp: j.experience || "",
        url: j.url,
        isNew,
      };
    });
}

/* ─────────── MATCHING ─────────── */
function matchCandidates(job) {
  const reqYears = parseInt(job.exp) || 0;
  return CANDIDATES.map((c) => {
    const overlap = c.skills.filter((s) => job.stack.includes(s));
    const skillScore = overlap.length / job.stack.length;
    const expScore = c.years >= reqYears ? 1 : c.years / reqYears;
    const score = Math.round((skillScore * 0.75 + expScore * 0.25) * 100);
    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
    const reason =
      overlap.length === 0
        ? "No direct stack overlap"
        : `${overlap.slice(0, 3).map(cap).join(", ")} · ${c.years} yrs experience${c.years >= reqYears ? "" : ` (below ${job.exp})`}`;
    return { ...c, score, overlap, reason };
  }).sort((a, b) => b.score - a.score).slice(0, 3);
}

        {syncInfo?.error && (
          <p className="text-[12px] font-semibold mt-2.5" style={{ color: T.red }}>

                {s.status === "live" ? <><Pause size={11} /> Pause</> : <><Play size={11} /> Resume</>}

}

/* ─────────── APP ─────────── */
function JobRadar() {
  const [view, setView] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [jobs, setJobs] = useState(INITIAL_JOBS);
  const [sources, setSources] = useState(INITIAL_SOURCES);
  const [expanded, setExpanded] = useState(1);
  const [query, setQuery] = useState("");
  const [simIndex, setSimIndex] = useState(0);
  const [toast, setToast] = useState(null);
  const [dataMode, setDataMode] = useState("demo");
  const [dataUrl, setDataUrl] = useState(LIVE_DATA_URL);
  const [syncing, setSyncing] = useState(false);
  const [syncInfo, setSyncInfo] = useState(null);

  const connectLiveData = async (url) => {
    if (!url) return;
    setSyncing(true);
    setSyncInfo(null);
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (!Array.isArray(data)) throw new Error("expected a JSON array (latest.json)");
      const mapped = mapScraperJobs(data);
      setJobs(mapped);
      setDataMode("live");
      setExpanded(mapped[0]?.id ?? null);
      const time = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
      setSyncInfo({ time, count: mapped.length });
      setToast(`Live data connected — ${mapped.length} vacancies loaded`);
      setTimeout(() => setToast(null), 3200);
    } catch (e) {
      setSyncInfo({ error: e.message });
    } finally {
      setSyncing(false);
    }
  };

  useEffect(() => { if (LIVE_DATA_URL) connectLiveData(LIVE_DATA_URL); }, []);

  const resetDemo = () => {
    setJobs(INITIAL_JOBS);
    setDataMode("demo");
    setSyncInfo(null);
    setExpanded(1);
  };

  const enriched = useMemo(() => jobs.map((j) => ({ ...j, matches: matchCandidates(j) })), [jobs]);
  const searchFiltered = enriched.filter((j) => {
    const q = query.toLowerCase();
    return j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q) || j.stack.some((s) => s.includes(q));
  });
  const newCount = jobs.filter((j) => j.isNew).length;

  const simulate = () => {
    const next = SIMULATED_JOBS[simIndex % SIMULATED_JOBS.length];
    const job = { ...next, id: Date.now(), date: "Jul 14, 2026", isNew: true };
    setJobs((p) => [job, ...p]);
    setSimIndex((i) => i + 1);
    setExpanded(job.id);
    setToast(`New vacancy at ${next.company} — matched against ${CANDIDATES.length} CVs`);
    setTimeout(() => setToast(null), 3200);
  };

  return (
    <div className="min-h-screen flex" style={{ background: T.bg, color: T.ink, fontFamily: "'Inter', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { -webkit-font-smoothing: antialiased; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
        .slide { animation: slideIn .3s cubic-bezier(.2,.8,.3,1) }
        @keyframes expand { from { opacity: 0; transform: translateY(-4px) } to { opacity: 1; transform: translateY(0) } }
        .expand { animation: expand .25s ease-out }
        @keyframes glow { 0%,100% { opacity:1 } 50% { opacity:.4 } }
        .glow { animation: glow 1.6s infinite }
        @keyframes spin360 { to { transform: rotate(360deg) } }
        .spin { animation: spin360 1s linear infinite }
        .row-hover { transition: background .15s ease }
        .row-hover:hover { background: #FAFBFE }
        input::placeholder { color: #9DA1B4 }
        input[type=range] { height: 4px }
        .trend-row { display: grid; grid-template-columns: 1fr auto; }
        @media (min-width: 768px) { .trend-row { grid-template-columns: 1fr 2fr 90px 100px 90px; } }
        .source-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 8px; }
        @media (min-width: 768px) { .source-row { grid-template-columns: 180px 1fr 110px 90px; } }
      `}</style>

      <Sidebar view={view} setView={setView} collapsed={collapsed} setCollapsed={setCollapsed} newCount={newCount} />

      {toast && (
        <div className="slide fixed top-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2.5 rounded-xl text-[13px] font-semibold text-white" style={{ background: T.ink, boxShadow: "0 12px 32px rgba(14,17,41,0.25)" }}>
          <Bell size={14} color="#F9A8D4" /> {toast}
        </div>
      )}

      <main className="flex-1 min-w-0 px-5 md:px-8 py-7 overflow-y-auto">
        <div className="max-w-5xl mx-auto">
          {view === "dashboard" && (
            <DashboardView enriched={enriched} searchFiltered={searchFiltered} jobs={jobs} query={query} setQuery={setQuery} expanded={expanded} setExpanded={setExpanded} simulate={simulate} dataMode={dataMode} syncInfo={syncInfo} />
          )}
          {view === "trends" && <TrendsView />}
          {view === "candidates" && <CandidatesView />}
          {view === "sources" && <SourcesView sources={sources} setSources={setSources} dataMode={dataMode} dataUrl={dataUrl} setDataUrl={setDataUrl} connect={connectLiveData} syncing={syncing} syncInfo={syncInfo} resetDemo={resetDemo} />}
          {view === "alerts" && <AlertsView />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JobRadar />);

  </script>
