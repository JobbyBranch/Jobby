/* ─────────── LIGHTWEIGHT CHARTS (no external libs) ─────────── */
function MiniAreaChart({ data }) {
  const W = 640, H = 200, P = 28;
  const maxMon = Math.max(...data.map((d) => d.monitored)) * 1.15;
  const maxMkt = Math.max(...data.map((d) => d.market)) * 1.15;
  const x = (i) => P + (i * (W - 2 * P)) / (data.length - 1);
  const yMon = (v) => H - P - (v / maxMon) * (H - 2 * P);
  const yMkt = (v) => H - P - (v / maxMkt) * (H - 2 * P);
  const monPts = data.map((d, i) => `${x(i)},${yMon(d.monitored)}`).join(" ");
  const mktPts = data.map((d, i) => `${x(i)},${yMkt(d.market)}`).join(" ");
  const monArea = `${P},${H - P} ${monPts} ${W - P},${H - P}`;
  return (
    <svg viewBox={`0 0 ${W} ${H + 18}`} className="w-full" style={{ height: 230 }}>
      <defs>
        <linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#EC4899" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#EC4899" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0.25, 0.5, 0.75, 1].map((f) => (
        <line key={f} x1={P} x2={W - P} y1={H - P - f * (H - 2 * P)} y2={H - P - f * (H - 2 * P)} stroke="#E9EAF1" strokeDasharray="3 3" />
      ))}
      <polygon points={monArea} fill="url(#agrad)" />
      <polyline points={mktPts} fill="none" stroke="#4F6BFF" strokeWidth="2" strokeDasharray="5 4" />
      <polyline points={monPts} fill="none" stroke="#EC4899" strokeWidth="2.5" strokeLinejoin="round" />
      {data.map((d, i) => <circle key={i} cx={x(i)} cy={yMon(d.monitored)} r="3" fill="#EC4899" />)}
      {data.map((d, i) => (
        <text key={i} x={x(i)} y={H + 8} textAnchor="middle" fontSize="9.5" fontWeight="600" fill="#9DA1B4">{d.week}</text>
      ))}
    </svg>
  );
}

function MiniBarChart({ data }) {
  const W = 640, H = 210, P = 26;
  const maxAbs = Math.max(...data.map((d) => Math.abs(d.change))) * 1.15;
  const zero = P + ((H - 2 * P) * maxAbs) / (2 * maxAbs) + (H - 2 * P) / 2 * 0; // midline
  const y0 = H / 2;
  const scale = (H / 2 - P) / maxAbs;
  const bw = (W - 2 * P) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H + 14}`} className="w-full" style={{ height: 230 }}>
      <line x1={P - 8} x2={W - P + 8} y1={y0} y2={y0} stroke="#E9EAF1" />
      {data.map((d, i) => {
        const h = Math.abs(d.change) * scale;
        const bx = P + i * bw + bw * 0.18;
        const by = d.change >= 0 ? y0 - h : y0;
        return (
          <g key={d.skill}>
            <rect x={bx} y={by} width={bw * 0.64} height={h} rx="5" fill={d.change >= 0 ? "#4F6BFF" : "#F0A5C0"} />
            <text x={bx + bw * 0.32} y={d.change >= 0 ? by - 5 : by + h + 11} textAnchor="middle" fontSize="9.5" fontWeight="700"
              fill={d.change >= 0 ? "#4F6BFF" : "#DB5E8F"}>{d.change > 0 ? "+" : ""}{d.change}%</text>
            <text x={bx + bw * 0.32} y={H + 8} textAnchor="middle" fontSize="9" fontWeight="600" fill="#9DA1B4">{d.skill}</text>
          </g>
        );
      })}
    </svg>
  );
}

const AVATAR_COLORS = ["#EC4899", "#4F6BFF", "#8B5CF6", "#06B6D4", "#F59E0B", "#10B981", "#6366F1", "#F43F5E"];

function companyVisual(name) {
  let h = 0;
  for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  const words = name.trim().split(/\s+/);
  const logo = (words.length > 1 ? words[0][0] + words[1][0] : name.slice(0, 2)).toUpperCase();
  return { logo, color: AVATAR_COLORS[h % AVATAR_COLORS.length] };
}

function parseCsv(text) {
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === ",") { row.push(field); field = ""; }
    else if (ch === "\n" || ch === "\r") {
      if (ch === "\r" && text[i + 1] === "\n") i++;
      row.push(field); field = "";
      if (row.some((c) => c.trim() !== "")) rows.push(row);
      row = [];
    } else field += ch;
  }
  row.push(field);
  if (row.some((c) => c.trim() !== "")) rows.push(row);
  return rows;
}

function sheetRowsToCandidates(rows) {
  if (rows.length < 2) throw new Error("sheet has no data rows");
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const col = (names) => header.findIndex((h) => names.some((n) => h.includes(n)));
  const iName = col(["name", "naam"]);
  const iTitle = col(["role", "title", "functie", "rol"]);
  const iYears = col(["year", "jaren", "ervaring", "experience"]);
  const iSkills = col(["skill", "tech", "stack"]);
  if (iName < 0) throw new Error("no Name column found — the first row must contain column names (Name, Role, Years, Skills)");
  return rows.slice(1)
    .filter((r) => (r[iName] || "").trim())
    .map((r, i) => {
      const name = r[iName].trim();
      const v = companyVisual(name);
      return {
        id: Date.now() + i,
        name,
        title: iTitle >= 0 ? (r[iTitle] || "—").trim() : "—",
        years: iYears >= 0 ? (parseInt(r[iYears]) || 0) : 0,
        skills: iSkills >= 0 ? [...new Set(String(r[iSkills] || "").split(/[,;]+/).map((x) => normalizeSkill(x)).filter(Boolean))] : [],
        initials: v.logo, color: v.color,
      };
    });
}

function mapScraperJobs(data) {
  const now = Date.now();
  return data
    .filter((j) => j && j.title && j.url)
    .map((j, i) => {
      const v = companyVisual(j.company || "?");
      const fs = j.first_seen ? new Date(j.first_seen) : null;
      const isNew = fs ? (now - fs.getTime()) / 86400000 < 2 : false;
      return {
        id: `live-${i}`,
        company: j.company || "Unknown",
        logo: v.logo,
        logoColor: v.color,
        title: j.title,
        iso: j.first_seen || "",
        stack: [...new Set((j.stack || []).map(normalizeSkill))].slice(0, 6),
        exp: j.experience || "",
        url: j.url,
        ai_matches: j.ai_matches || null,
        isNew,
      };
    });
}

function normalizeSkill(raw) {
  const s = String(raw).toLowerCase().trim();
  return SKILL_SYNONYMS[s] || s;
}

// generic terms count for less in the score than distinctive ones
const GENERIC_SKILLS = new Set(["sql", "agile", "scrum", "git", "rest", "api", "html", "css", "javascript", "jira", "confluence", "docker", "ci/cd", "linux", "unit testing"]);
const skillWeight = (sk) => (GENERIC_SKILLS.has(sk) ? 0.5 : 1);

/* ─────────── AI MATCH RESOLVER (Level 3) ─────────── */
// The scraper stores matches as sheet row numbers (never names). Here we map
// rows back to the candidate list synced in THIS browser. The "check" field
// (first letter + years) detects when the sheet order changed since matching;
// on any mismatch we fall back to live keyword matching.
function resolveAiMatches(job, candidates) {
  if (!job.ai_matches || !Array.isArray(job.ai_matches) || !job.ai_matches.length) return null;
  const out = [];
  for (const m of job.ai_matches) {
    const c = candidates[m.row];
    if (!c) return null;
    const chk = (c.name[0] || "?").toLowerCase() + String(c.years);
    if (m.check && m.check !== chk) return null;
    out.push({ ...c, score: Math.max(0, Math.min(100, m.score | 0)), overlap: [], reason: m.reason || "", ai: true });
  }
  return out.slice(0, 3);
}

/* ─────────── MATCHING ─────────── */
function matchCandidates(job, candidates) {
  const reqYears = parseInt(job.exp) || 0;
  const jobStack = [...new Set(job.stack.map(normalizeSkill))];
  const jobWeightTotal = jobStack.reduce((a, sk) => a + skillWeight(sk), 0) || 1;
  return candidates.map((c) => {
    const cSkills = new Set(c.skills.map(normalizeSkill));
    const overlap = jobStack.filter((sk) => cSkills.has(sk));
    const skillScore = overlap.reduce((a, sk) => a + skillWeight(sk), 0) / jobWeightTotal;
    const expScore = c.years >= reqYears ? 1 : c.years / reqYears;
    const score = Math.round((skillScore * 0.75 + expScore * 0.25) * 100);
    const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
    const reason =
      overlap.length === 0
        ? "No direct stack overlap"
        : `${overlap.slice(0, 3).map(cap).join(", ")} · ${c.years} yrs experience${c.years >= reqYears ? "" : ` (below ${job.exp})`}`;
    return { ...c, score, overlap, reason };
  }).sort((a, b) => b.score - a.score).slice(0, 3);
}

/* ─────────── DASHBOARD · daily digest ─────────── */
function formatDayLabel(iso) {
  if (!iso) return "Date unknown";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diff = Math.round((today - d) / 86400000);
  const nice = d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  if (diff === 0) return `Today · ${nice}`;
  if (diff === 1) return `Yesterday · ${nice}`;
  return nice;
}

            <p className="text-[14.5px] font-semibold" style={{ color: T.sub }}>No jobs match your search</p>
            <p className="text-[13.5px] font-medium mt-1" style={{ color: T.faint }}>Try another company, role or technology</p>
          </div>
        )}
      </div>
    </>
  );
}

/* ─────────── CANDIDATES ─────────── */
function CandidatesView({ candidates, setCandidates }) {
  const [q, setQ] = useState("");
  const [editing, setEditing] = useState(null); // null | "new" | id
  const emptyForm = { name: "", title: "", years: 3, skills: "" };
  const [form, setForm] = useState(emptyForm);
  const fileRef = React.useRef(null);
  const [sheetUrl, setSheetUrl] = useState(() => { try { return localStorage.getItem("jobradar-sheet-url") || ""; } catch (e) { return ""; } });
  const [sheetBusy, setSheetBusy] = useState(false);
  const [sheetInfo, setSheetInfo] = useState(null);

  const syncSheet = async () => {
    if (!sheetUrl) return;
    setSheetBusy(true); setSheetInfo(null);
    try {
      const r = await fetch(sheetUrl);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const text = await r.text();
      if (text.trim().startsWith("<")) throw new Error("that link returns a web page, not CSV — use File \u2192 Share \u2192 Publish to web and pick CSV");
      const mapped = sheetRowsToCandidates(parseCsv(text));
      if (!mapped.length) throw new Error("no candidate rows found");
      setCandidates(mapped);
      try { localStorage.setItem("jobradar-sheet-url", sheetUrl); } catch (e) {}
      setSheetInfo({ count: mapped.length, time: new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }) });
    } catch (e) {
      setSheetInfo({ error: e.message });
    } finally {
      setSheetBusy(false);
    }
  };

  const list = candidates.filter((c) =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    c.skills.some((sk) => sk.includes(q.toLowerCase())) ||
    c.title.toLowerCase().includes(q.toLowerCase()));

  const startNew = () => { setForm(emptyForm); setEditing("new"); };
  const startEdit = (c) => { setForm({ name: c.name, title: c.title, years: c.years, skills: c.skills.join(", ") }); setEditing(c.id); };
  const remove = (c) => { if (window.confirm(`Remove ${c.name} from the CV base?`)) setCandidates((prev) => prev.filter((x) => x.id !== c.id)); };

  const save = () => {
    if (!form.name.trim()) return;
    const v = companyVisual(form.name.trim());
    const data = {
      name: form.name.trim(),
      title: form.title.trim() || "—",
      years: Math.max(0, parseInt(form.years) || 0),
      skills: [...new Set(String(form.skills).split(/[,;]+/).map((x) => normalizeSkill(x)).filter(Boolean))].slice(0, 14),
      initials: v.logo, color: v.color,
    };
    if (editing === "new") setCandidates((prev) => [{ id: Date.now(), ...data }, ...prev]);
    else setCandidates((prev) => prev.map((c) => (c.id === editing ? { ...c, ...data } : c)));
    setEditing(null);
  };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify(candidates, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "candidates-backup.json";
    a.click();
  };

  const importJson = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const arr = JSON.parse(r.result);
        if (!Array.isArray(arr) || !arr.length) throw new Error("empty");
        const mapped = arr.map((c, i) => {
          const v = companyVisual(String(c.name || "?"));
          return {
            id: Date.now() + i,
            name: String(c.name || "Unknown"),
            title: String(c.title || "—"),
            years: parseInt(c.years) || 0,
            skills: (Array.isArray(c.skills) ? c.skills : String(c.skills || "").split(","))
              .map((x) => normalizeSkill(x)).filter(Boolean),
            initials: v.logo, color: v.color,
          };
        });
        setCandidates(mapped);
      } catch (err) {
        window.alert("Could not read this file. It must be a JSON list of candidates — click Export first to see the exact format.");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  const inputStyle = { background: "#F4F5F9", border: `1px solid ${T.line}`, borderRadius: 10 };

  return (
    <>
      <PageHeader
        title="Candidates"
        subtitle={`${candidates.length} candidates in your CV base — every new vacancy is matched against this list`}
        action={
          <div className="flex items-center gap-2">
            <button onClick={() => fileRef.current && fileRef.current.click()} className="flex items-center gap-1.5 text-[13.5px] font-semibold px-3 h-9 rounded-[10px] transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
              <Upload size={13} /> Import
            </button>
            <button onClick={exportJson} className="flex items-center gap-1.5 text-[13.5px] font-semibold px-3 h-9 rounded-[10px] transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
              <Download size={13} /> Export
            </button>
            <button onClick={startNew} className="flex items-center gap-1.5 text-[14px] font-semibold px-4 h-9 rounded-[10px] text-white transition-opacity hover:opacity-90" style={{ background: T.grad, boxShadow: "0 4px 14px rgba(79,107,255,0.28)" }}>
              <Plus size={14} strokeWidth={2.4} /> Add candidate
            </button>
            <input ref={fileRef} type="file" accept=".json,application/json" onChange={importJson} style={{ display: "none" }} />
          </div>
        }
      />

      {/* privacy note */}
      <div style={cardStyle} className="p-3.5 mb-5 flex items-start gap-3">
        <ShieldCheck size={16} color={T.green} style={{ marginTop: 2, flexShrink: 0 }} />
        <p className="text-[13px] font-medium leading-relaxed" style={{ color: T.sub }}>
          <span className="font-bold" style={{ color: T.ink }}>Your candidate data stays on this device.</span> It is stored only in this browser — never uploaded to GitHub or any server. Use <span className="font-bold">Export</span> regularly as a backup and to move the list to another computer (then Import it there). Clearing your browser data removes the list.
        </p>
      </div>

      {/* google sheet sync */}
      <div style={cardStyle} className="p-4 mb-5">
        <div className="flex items-center gap-2 mb-1">
          <RefreshCw size={14} color={T.blue} />
          <span className="text-[14.5px] font-bold tracking-tight">Sync from Google Sheet</span>
        </div>
        <p className="text-[13px] font-medium mb-3" style={{ color: T.sub }}>
          Keep candidates in a team-editable Google Sheet with columns <span className="font-bold">Name, Role, Years, Skills</span>. In the Sheet: File → Share → Publish to web → choose <span className="font-bold">Comma-separated values (.csv)</span> → paste that link here. The link is remembered only in this browser.
        </p>
        <div className="flex items-center gap-2 flex-wrap">
          <div className="flex items-center gap-2 px-3 h-9 rounded-[10px] flex-1 min-w-[240px]" style={{ background: "#F4F5F9", border: `1px solid ${T.line}` }}>
            <Link2 size={14} color={T.faint} />
            <input value={sheetUrl} onChange={(e) => setSheetUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/e/…/pub?output=csv" className="outline-none text-[13.5px] font-medium w-full bg-transparent" />
          </div>
          <button onClick={syncSheet} disabled={sheetBusy || !sheetUrl} className="flex items-center gap-1.5 text-[14px] font-semibold px-4 h-9 rounded-[10px] text-white transition-opacity hover:opacity-90 disabled:opacity-50" style={{ background: T.grad }}>
            <RefreshCw size={13} className={sheetBusy ? "spin" : ""} /> {sheetBusy ? "Syncing…" : "Sync"}
          </button>
        </div>
        {sheetInfo && sheetInfo.error && (
          <p className="text-[13px] font-semibold mt-2.5" style={{ color: T.red }}>Couldn't sync: {sheetInfo.error}</p>
        )}
        {sheetInfo && sheetInfo.count != null && (
          <p className="text-[13px] font-semibold mt-2.5" style={{ color: T.green }}>Synced {sheetInfo.count} candidates at {sheetInfo.time} — replaced the local list.</p>
        )}
      </div>

      {/* editor */}
      {editing !== null && (
        <div style={cardStyle} className="p-5 mb-5 expand">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-[15.5px] font-bold tracking-tight">{editing === "new" ? "Add candidate" : "Edit candidate"}</h3>
            <button onClick={() => setEditing(null)} className="flex items-center justify-center w-7 h-7 rounded-lg transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
              <XIcon size={13} />
            </button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <div>
              <label className="text-[12.5px] font-bold uppercase tracking-wider" style={{ color: T.faint }}>Name</label>
              <input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} placeholder="e.g. Sofie Vermeulen" className="w-full mt-1 px-3 h-9 outline-none text-[14px] font-medium" style={inputStyle} />
            </div>
            <div>
              <label className="text-[12.5px] font-bold uppercase tracking-wider" style={{ color: T.faint }}>Current role</label>
              <input value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} placeholder="e.g. Senior Java Engineer" className="w-full mt-1 px-3 h-9 outline-none text-[14px] font-medium" style={inputStyle} />
            </div>
            <div>
              <label className="text-[12.5px] font-bold uppercase tracking-wider" style={{ color: T.faint }}>Years of experience</label>
              <input type="number" min="0" max="50" value={form.years} onChange={(e) => setForm({ ...form, years: e.target.value })} className="w-full mt-1 px-3 h-9 outline-none text-[14px] font-medium" style={inputStyle} />
            </div>
          </div>
          <div className="mb-4">
            <label className="text-[12.5px] font-bold uppercase tracking-wider" style={{ color: T.faint }}>Skills — comma separated</label>
            <input value={form.skills} onChange={(e) => setForm({ ...form, skills: e.target.value })} placeholder="java, spring, kubernetes, aws" className="w-full mt-1 px-3 h-9 outline-none text-[14px] font-medium" style={inputStyle} />
            <p className="text-[12px] font-medium mt-1" style={{ color: T.faint }}>These are what vacancies are matched on — use the same words vacancies use (java, react, azure, devops…)</p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={save} disabled={!form.name.trim()} className="text-[14px] font-semibold px-5 h-9 rounded-[10px] text-white transition-opacity hover:opacity-90 disabled:opacity-40" style={{ background: T.grad }}>
              {editing === "new" ? "Add candidate" : "Save changes"}
            </button>
            <button onClick={() => setEditing(null)} className="text-[14px] font-semibold px-4 h-9 rounded-[10px] transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
              Cancel
            </button>
          </div>
        </div>
      )}

      <div className="flex items-center gap-2 px-3 h-9 rounded-[10px] max-w-[280px] mb-5" style={{ background: "#fff", border: `1px solid ${T.line}` }}>
        <Search size={14} color={T.faint} />
        <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search name, role or skill…" className="outline-none text-[14px] font-medium w-full bg-transparent" />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
        {list.map((c) => (
          <div key={c.id} style={cardStyle} className="p-4 transition-shadow hover:shadow-md">
            <div className="flex items-center gap-3 mb-3">
              <Avatar c={c} size={40} ring={false} />
              <div className="min-w-0 flex-1">
                <div className="text-[15px] font-bold tracking-tight truncate">{c.name}</div>
                <div className="text-[13px] font-medium truncate" style={{ color: T.sub }}>{c.title} · {c.years} yrs</div>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={() => startEdit(c)} title="Edit" className="flex items-center justify-center w-7 h-7 rounded-lg transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
                  <Pencil size={12} />
                </button>
                <button onClick={() => remove(c)} title="Remove" className="flex items-center justify-center w-7 h-7 rounded-lg transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: "#DC2626" }}>
                  <Trash2 size={12} />
                </button>
              </div>
            </div>
            <div className="flex flex-wrap mb-2">{c.skills.map((sk) => <Chip key={sk} label={sk} />)}</div>
          </div>
        ))}
        {list.length === 0 && (
          <div className="col-span-full px-5 py-12 text-center" style={cardStyle}>
            <p className="text-[14.5px] font-semibold" style={{ color: T.sub }}>{candidates.length === 0 ? "Your CV base is empty" : `No candidates match “${q}”`}</p>
            <p className="text-[13.5px] font-medium mt-1" style={{ color: T.faint }}>{candidates.length === 0 ? "Click “Add candidate” to add your first profile" : "Try another name, role or skill"}</p>
          </div>
        )}
      </div>
    </>
  );
}

        </div>
        <div className="flex-1 min-w-[220px]">
          <div className="text-[14.5px] font-bold tracking-tight">Scan schedule: Monday – Friday at 08:00</div>
          <div className="text-[13px] font-medium mt-0.5" style={{ color: T.sub }}>Timezone Europe/Brussels · no scans in the weekend · {live} of {sources.length} pages active</div>
        </div>
        <div className="flex items-center gap-1.5 text-[13px] font-semibold px-3 py-1.5 rounded-full" style={{ background: T.greenSoft, color: T.green }}>
          <span className="glow w-1.5 h-1.5 rounded-full" style={{ background: T.green }} />
          Next scan: Wed Jul 15, 08:00
        </div>
      </div>

      <div style={cardStyle} className="overflow-hidden">
        <div className="hidden md:grid px-5 py-3 text-[12px] font-bold uppercase tracking-wider" style={{ gridTemplateColumns: "180px 1fr 110px 90px", color: T.faint, borderBottom: `1px solid ${T.line}` }}>
          <span>Company</span><span>Career page</span><span>Status</span><span className="text-right">Action</span>
        </div>
        {sources.map((s, i) => (
          <div key={s.id} className="row-hover source-row items-center px-5 py-3" style={{ borderBottom: i < sources.length - 1 ? `1px solid ${T.line}` : "none" }}>
            <div className="text-[14px] font-bold tracking-tight truncate pr-2">{s.company}</div>
            <a href={s.url} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 text-[13.5px] font-medium truncate hover:underline min-w-0" style={{ color: T.blue }}>
              <span className="truncate">{s.name}</span> <ArrowUpRight size={12} className="shrink-0" />
            </a>
            <div className="flex items-center gap-1.5 text-[13px] font-semibold" style={{ color: s.status === "live" ? T.green : T.faint }}>
              <span className={`w-1.5 h-1.5 rounded-full ${s.status === "live" ? "glow" : ""}`} style={{ background: s.status === "live" ? T.green : T.faint }} />
              {s.status === "live" ? "Live" : "Paused"}
            </div>
            <div className="flex justify-end">
              <button onClick={() => toggle(s.id)} className="flex items-center gap-1 text-[13px] font-semibold px-2.5 h-7 rounded-lg transition-colors hover:bg-gray-50" style={{ border: `1px solid ${T.line}`, color: T.sub }}>
                {s.status === "live" ? <><Pause size={11} /> Pause</> : <><Play size={11} /> Resume</>}
              </button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

/* ─────────── ALERTS ─────────── */
function AlertsView() {
  const [threshold, setThreshold] = useState(75);
  const [channels, setChannels] = useState({ slack: true, email: true });
  const Toggle = ({ on, onClick }) => (
    <button onClick={onClick} className="relative w-9 h-5 rounded-full transition-colors" style={{ background: on ? T.blue : "#D8DAE5" }}>
      <span className="absolute top-[2px] w-4 h-4 rounded-full bg-white transition-all" style={{ left: on ? 18 : 2, boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
    </button>
  );
  return (
    <>
      <PageHeader title="Alerts" subtitle="Choose when and where you get notified about strong matches" />
      <div className="max-w-xl space-y-4">
        <div style={cardStyle} className="p-5">
          <div className="text-[15px] font-bold tracking-tight mb-1">Match threshold</div>
          <p className="text-[13.5px] font-medium mb-4" style={{ color: T.sub }}>Notify me when a new vacancy scores at least <span className="font-bold" style={{ color: T.pink }}>{threshold}%</span> against a candidate.</p>
          <input type="range" min={50} max={95} step={5} value={threshold} onChange={(e) => setThreshold(+e.target.value)} className="w-full accent-pink-500" />
          <div className="flex justify-between text-[12px] font-semibold mt-1" style={{ color: T.faint }}><span>50%</span><span>95%</span></div>
        </div>
        <div style={cardStyle} className="p-5">
          <div className="text-[15px] font-bold tracking-tight mb-4">Channels</div>
          <div className="flex items-center justify-between py-2">
            <div><div className="text-[14px] font-semibold">Slack</div><div className="text-[13px] font-medium" style={{ color: T.faint }}>#new-vacancies channel</div></div>
            <Toggle on={channels.slack} onClick={() => setChannels((c) => ({ ...c, slack: !c.slack }))} />
          </div>
          <div className="flex items-center justify-between py-2" style={{ borderTop: `1px solid ${T.line}` }}>
            <div><div className="text-[14px] font-semibold">Email digest</div><div className="text-[13px] font-medium" style={{ color: T.faint }}>Daily at 9:00</div></div>
            <Toggle on={channels.email} onClick={() => setChannels((c) => ({ ...c, email: !c.email }))} />
          </div>
        </div>
      </div>
    </>
  );
}

/* ─────────── SIDEBAR ─────────── */
const NAV = [
  { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
  { id: "trends", label: "Hiring trends", icon: BarChart3 },
  { id: "candidates", label: "Candidates", icon: Users, badge: "count" },
  { id: "sources", label: "Sources", icon: Globe },
  { id: "alerts", label: "Alerts", icon: Bell },
];

function Sidebar({ view, setView, collapsed, setCollapsed, newCount, candidatesCount }) {
  return (
    <nav className="shrink-0 sticky top-0 h-screen flex flex-col transition-all duration-200" style={{ width: collapsed ? 64 : 224, background: "#FFFFFF", borderRight: `1px solid ${T.line}` }}>
      <div className="flex items-center gap-2.5 px-4 h-16" style={{ borderBottom: `1px solid ${T.line}` }}>
        <div className="rounded-[10px] p-[7px] shrink-0" style={{ background: T.grad }}>
          <Radar size={18} color="#fff" strokeWidth={2.4} />
        </div>
        {!collapsed && <span className="text-[17px] font-bold tracking-tight">jobradar</span>}
      </div>

      <div className="flex-1 px-2.5 py-4 space-y-1">
        {NAV.map((item) => {
          const active = view === item.id;
          const showBadge = item.id === "dashboard" && newCount > 0;
          return (
            <button key={item.id} onClick={() => setView(item.id)} title={collapsed ? item.label : undefined}
              className="w-full flex items-center gap-2.5 px-2.5 h-9 rounded-[10px] text-[14px] font-semibold transition-colors"
              style={{ background: active ? T.blueSoft : "transparent", color: active ? T.blue : T.sub, justifyContent: collapsed ? "center" : "flex-start" }}>
              <item.icon size={16} strokeWidth={2.2} className="shrink-0" />
              {!collapsed && <span className="flex-1 text-left">{item.label}</span>}
              {!collapsed && showBadge && <span className="text-[11px] font-bold px-1.5 py-[1px] rounded-full text-white" style={{ background: T.grad }}>{newCount}</span>}
              {!collapsed && item.badge && !showBadge && <span className="text-[11.5px] font-bold px-1.5 py-[1px] rounded-full" style={{ background: "#F3F4F8", color: T.faint }}>{candidatesCount}</span>}
            </button>
          );
        })}
      </div>

      <div className="px-2.5 pb-4 space-y-2">
        {!collapsed && (
          <div className="flex items-center gap-2 px-2.5 py-2 rounded-[10px] text-[12.5px] font-semibold" style={{ background: T.greenSoft, color: T.green }}>
            <span className="glow w-1.5 h-1.5 rounded-full shrink-0" style={{ background: T.green }} />
            Monitoring 39 pages
          </div>
        )}
        <div className="flex items-center gap-2.5 px-2.5 py-2" style={{ borderTop: `1px solid ${T.line}` }}>
          {!collapsed && (
            <>
              <div className="flex items-center justify-center w-7 h-7 rounded-full text-[11.5px] font-bold text-white shrink-0" style={{ background: T.ink }}>YO</div>
              <div className="min-w-0 flex-1">
                <div className="text-[13px] font-bold truncate">Your Agency</div>
                <div className="text-[11.5px] font-medium truncate" style={{ color: T.faint }}>Pro plan</div>
              </div>
            </>
          )}
          <button onClick={() => setCollapsed(!collapsed)} className="flex items-center justify-center w-7 h-7 rounded-lg transition-colors hover:bg-gray-50 shrink-0 mx-auto" style={{ border: `1px solid ${T.line}`, color: T.sub }} title={collapsed ? "Expand" : "Collapse"}>
            {collapsed ? <ChevronsRight size={13} /> : <ChevronsLeft size={13} />}
          </button>
        </div>
      </div>
    </nav>
  );
}

/* ─────────── APP ─────────── */
function JobRadar() {
  const [view, setView] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [jobs, setJobs] = useState(INITIAL_JOBS);
  const [sources, setSources] = useState(INITIAL_SOURCES);
  const [expanded, setExpanded] = useState(1);
  const [query, setQuery] = useState("");
  const [simIndex, setSimIndex] = useState(0);
  const [toast, setToast] = useState(null);
  const [candidates, setCandidates] = useState(() => {
    try {
      const saved = localStorage.getItem("jobradar-candidates");
      if (saved) { const arr = JSON.parse(saved); if (Array.isArray(arr) && arr.length) return arr; }
    } catch (e) {}
    return CANDIDATES;
  });
  useEffect(() => {
    try { localStorage.setItem("jobradar-candidates", JSON.stringify(candidates)); } catch (e) {}
  }, [candidates]);

  const [dataMode, setDataMode] = useState("demo");
  const [dataUrl, setDataUrl] = useState(LIVE_DATA_URL);
  const [syncing, setSyncing] = useState(false);
  const [syncInfo, setSyncInfo] = useState(null);

  const connectLiveData = async (url) => {
    if (!url) return;
    setSyncing(true);
    setSyncInfo(null);
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      if (!Array.isArray(data)) throw new Error("expected a JSON array (latest.json)");
      const mapped = mapScraperJobs(data);
      setJobs(mapped);
      setDataMode("live");
      setExpanded(mapped[0]?.id ?? null);
      const time = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
      setSyncInfo({ time, count: mapped.length });
      setToast(`Live data connected — ${mapped.length} vacancies loaded`);
      setTimeout(() => setToast(null), 3200);
    } catch (e) {
      setSyncInfo({ error: e.message });
    } finally {
      setSyncing(false);
    }
  };

  useEffect(() => { if (LIVE_DATA_URL) connectLiveData(LIVE_DATA_URL); }, []);

  const resetDemo = () => {
    setJobs(INITIAL_JOBS);
    setDataMode("demo");
    setSyncInfo(null);
    setExpanded(1);
  };

  const enriched = useMemo(() => jobs.map((j) => ({ ...j, matches: resolveAiMatches(j, candidates) || matchCandidates(j, candidates) })), [jobs, candidates]);
  const searchFiltered = enriched.filter((j) => {
    const q = query.toLowerCase();
    return j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q) || j.stack.some((s) => s.includes(q));
  });
  const newCount = jobs.filter((j) => j.isNew).length;

  const simulate = () => {
    const next = SIMULATED_JOBS[simIndex % SIMULATED_JOBS.length];
    const job = { ...next, id: Date.now(), iso: new Date().toISOString().slice(0, 10), isNew: true };
    setJobs((p) => [job, ...p]);
    setSimIndex((i) => i + 1);
    setExpanded(job.id);
    setToast(`New vacancy at ${next.company} — matched against ${candidates.length} CVs`);
    setTimeout(() => setToast(null), 3200);
  };

  return (
    <div className="min-h-screen flex" style={{ background: T.bg, color: T.ink, fontFamily: "'Inter', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { -webkit-font-smoothing: antialiased; }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
        .slide { animation: slideIn .3s cubic-bezier(.2,.8,.3,1) }
        @keyframes expand { from { opacity: 0; transform: translateY(-4px) } to { opacity: 1; transform: translateY(0) } }
        .expand { animation: expand .25s ease-out }
        @keyframes glow { 0%,100% { opacity:1 } 50% { opacity:.4 } }
        .glow { animation: glow 1.6s infinite }
        @keyframes spin360 { to { transform: rotate(360deg) } }
        .spin { animation: spin360 1s linear infinite }
        .row-hover { transition: background .15s ease }
        .row-hover:hover { background: #FAFBFE }
        input::placeholder { color: #9DA1B4 }
        input[type=range] { height: 4px }
        .trend-row { display: grid; grid-template-columns: 1fr auto; }
        @media (min-width: 768px) { .trend-row { grid-template-columns: 1fr 2fr 90px 100px 90px; } }
        .source-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 8px; }
        @media (min-width: 768px) { .source-row { grid-template-columns: 180px 1fr 110px 90px; } }
      `}</style>

      <Sidebar view={view} setView={setView} collapsed={collapsed} setCollapsed={setCollapsed} newCount={newCount} candidatesCount={candidates.length} />

      {toast && (
        <div className="slide fixed top-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2.5 rounded-xl text-[14px] font-semibold text-white" style={{ background: T.ink, boxShadow: "0 12px 32px rgba(14,17,41,0.25)" }}>
          <Bell size={14} color="#F9A8D4" /> {toast}
        </div>
      )}

      <main className="flex-1 min-w-0 px-5 md:px-8 py-7 overflow-y-auto">
        <div className="max-w-5xl mx-auto">
          {view === "dashboard" && (
            <DashboardView enriched={enriched} searchFiltered={searchFiltered} jobs={jobs} query={query} setQuery={setQuery} expanded={expanded} setExpanded={setExpanded} simulate={simulate} dataMode={dataMode} syncInfo={syncInfo} candidatesCount={candidates.length} />
          )}
          {view === "trends" && <TrendsView />}
          {view === "candidates" && <CandidatesView candidates={candidates} setCandidates={setCandidates} />}
          {view === "sources" && <SourcesView sources={sources} setSources={setSources} dataMode={dataMode} dataUrl={dataUrl} setDataUrl={setDataUrl} connect={connectLiveData} syncing={syncing} syncInfo={syncInfo} resetDemo={resetDemo} />}
          {view === "alerts" && <AlertsView />}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<JobRadar />);

  </script>
</body>
</html>
